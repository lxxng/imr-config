# Rime schema
# encoding: utf-8

# 适配了仓输入法 [Hamster](https://github.com/imfuxiao/Hamster/) 九宫格布局。
#
# 可选，支持英文：
# 1. 解开 `engine/translators` 下的注释
# 2. 将 `others/Hamster/melt_eng.custom.yaml` 里的文件拷贝至配置目录，该补丁转写了英文的拼写规则到九宫格；

__include: rime_ice.schema.yaml:/

t9:
  # 是否显示 rime 中原始的预编辑文本，默认为 true
  # true: 对 preedit 不做处理，显示 rime 返回的原始 preedit 值。
  #       如果想通过 lua 自己调整 preedit 的显示，可以设置为 true。
  # false: 根据候选字 comment 显示转换后的 preedit 内容。
  #        注意：请务必保证候选字 comment 有效且正确，否则可能导致预编辑文本显示异常。
  isDisplayOriginalPreedit: true

schema:
  schema_id: imr_9230
  name: IMR九键-9230
  version: "α"
  author:
    - Dvel
    - "[morse.hsiao](https://github.com/imfuxiao)"
    - "[tong-zhi-qing-shao-dian-shui](https://www.zhihu.com/people/tong-zhi-qing-shao-dian-shui)"
    - "[lxxng](https://github.com/lxxng)"
  description: |
    中文九(9)键双(2)拼 三(3)次击键 零(0)重码率
  dependencies:
    - melt_eng # 英文输入，作为次翻译器挂载到拼音方案
    - imr_radical_9230

engine:
  processors:
    - t9_processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - lua_translator@*date_translator # 时间、日期、星期
    - table_translator@custom_phrase # 自定义短语 custom_phrase_t9.txt
    # - table_translator@melt_eng     # 英文输入
    - lua_translator@*calc_translator    # 计算器
    - lua_translator@*force_gc           # 暴力 GC
  filters:
    - simplifier@emoji # Emoji
    - simplifier@traditionalize # 简繁切换
    - uniquifier # 去重

calculator:
  prefix: =
  show_prefix: true

# 处理符合特定规则的输入码，如网址、反查
recognizer:
  import_preset: default                # 从 default.yaml 继承通用的
  patterns:                             # 再增加方案专有的：
    calculator: "^=.+"                 # 响应 lua_translator@*calc_translator，计算器。前缀设定项 calculator/prefix

translator:
  prism: t9
  spelling_hints: 100
  comment_format: []

  contextual_suggestions: true
  max_homophones: 9
  max_homographs: 7

  # 显示原始输入
  preedit_format: []
  # dictionary_exclude: [肏屄, 鸡巴]  # 如有屏蔽 NSFW 词汇需求 librime >= 1.14.0 等价于从 .dict.yaml 中删除对应词条，但不影响组句和用户词库。

# 自定义短语：custom_phrase_t9.txt
# ⚠️ 编码要用数字
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase_t9
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99

# 九宫格 1 键上的符号序列
punctuator:
  half_shape:
    "1": [1, "@", ".", "/", ":", "_", "-", "#"]
    "@": [1, "@", ！, ：, 、, ……, ～]
    "#": [0, "#", "$", "%", "^", "&", "*", "(", ")"]

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA9876543210=
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA9876543210=
  algebra:
    - erase/^xx$/
    - derive/^([jqxy])u$/$1v/
    - derive/^([aoe])([ioun])$/$1$1$2/
    - xform/^([aoe])(ng)?$/$1$1$2/
    - xform/iu$/Ⓠ/
    - xform/[iu]a$/Ⓦ/
    - xform/[uv]an$/Ⓡ/
    - xform/[uv]e$/Ⓣ/
    - xform/ing$|uai$/Ⓨ/
    - xform/^sh/Ⓤ/
    - xform/^ch/Ⓘ/
    - xform/^zh/Ⓥ/
    - xform/uo$/Ⓞ/
    - xform/[uv]n$/Ⓟ/
    - xform/(.)i?ong$/$1Ⓢ/
    - xform/[iu]ang$/Ⓓ/
    - xform/(.)en$/$1Ⓕ/
    - xform/(.)eng$/$1Ⓖ/
    - xform/(.)ang$/$1Ⓗ/
    - xform/ian$/Ⓜ/
    - xform/(.)an$/$1Ⓙ/
    - xform/iao$/Ⓒ/
    - xform/(.)ao$/$1Ⓚ/
    - xform/(.)ai$/$1Ⓛ/
    - xform/(.)ei$/$1Ⓩ/
    - xform/ie$/Ⓧ/
    - xform/ui$/Ⓥ/
    - xform/(.)ou$/$1Ⓑ/
    - xform/in$/Ⓝ/
    - xlit/ⓆⓌⓇⓉⓎⓊⒾⓄⓅⓈⒹⒻⒼⒽⓂⒿⒸⓀⓁⓏⓍⓋⒷⓃ/qwrtyuiopsdfghmjcklzxvbn/


    # 第三次击键选码
    # 添加通配符
    - abbrev/^([a-z]).+$/$1\*/
    - abbrev/^.+([a-z])$/\*$1/

    - xform/^([qadgjmptx])([qadgjmptx])$/$1$2①/
    - xform/^([qadgjmptx])([behknruyw])$/$1$2②/
    - xform/^([qadgjmptx])([*cfilosvz])$/$1$2③/
    - xform/^([behknruyw])([qadgjmptx])$/$1$2④/
    - xform/^([behknruyw])([behknruyw])$/$1$2⑤/
    - xform/^([behknruyw])([*cfilosvz])$/$1$2⑥/
    - xform/^([*cfilosvz])([qadgjmptx])$/$1$2⑦/
    - xform/^([*cfilosvz])([behknruyw])$/$1$2⑧/
    - xform/^([*cfilosvz])([*cfilosvz])$/$1$2⑨/

    # 九宫格数字映射
    - xform/[qw*]/①/
    - xform/[abc]/②/
    - xform/[def]/③/
    - xform/[hgi]/④/
    - xform/[jkl]/⑤/
    - xform/[omn]/⑥/
    - xform/[prs]/⑦/
    - xform/[tuv]/⑧/
    - xform/[xyz]/⑨/
 
    - xlit/①②③④⑤⑥⑦⑧⑨/123456789/
grammar:
  language: wanxiang-lts-zh-hans
  collocation_max_length: 8
  collocation_min_length: 3
  collocation_penalty: -8
  rear_penalty: -18